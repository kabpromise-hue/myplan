<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset your password — Weekly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#1B2A4A;
    --paper:#FAF6EF;
    --paper-line:#E4DCC8;
    --coral:#E8743B;
    --sage:#7C9885;
    --graphite:#3A3A3A;
    --white:#FFFFFF;
    --red-margin:#C97B6B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image: repeating-linear-gradient(transparent, transparent 31px, var(--paper-line) 32px);
    color:var(--graphite);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
  .card{
    background:var(--white);
    border:1.5px solid var(--ink);
    box-shadow:8px 8px 0 rgba(27,42,74,0.1);
    max-width:400px; width:100%;
    padding:34px 30px;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:12px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--coral); margin-bottom:10px;
  }
  h1{
    font-family:'Source Serif 4',serif; font-size:28px; color:var(--ink);
    margin:0 0 6px; line-height:1.05;
  }
  .sub{ font-size:13.5px; color:#5b5b5b; margin-bottom:22px; line-height:1.5; }
  .field{ margin-bottom:16px; }
  .field label{
    display:block; font-family:'JetBrains Mono',monospace; font-size:11px; text-transform:uppercase;
    letter-spacing:.07em; color:var(--ink); margin-bottom:6px;
  }
  .field input{
    width:100%; font-family:'Inter',sans-serif; font-size:14px; padding:10px 11px;
    border:1.5px solid #d8d2c4; background:#fffdf9; color:var(--graphite); border-radius:2px;
  }
  .field input:focus{ outline:2px solid var(--coral); outline-offset:1px; border-color:var(--coral); }
  .submit-btn{
    width:100%; padding:13px; margin-top:6px; background:var(--ink); color:var(--paper); border:none;
    font-family:'Source Serif 4',serif; font-weight:600; font-size:16px; cursor:pointer;
  }
  .submit-btn[disabled]{ opacity:.6; cursor:default; }
  .submit-btn:hover:not([disabled]){ background:#15203a; }
  .msg{
    font-family:'JetBrains Mono',monospace; font-size:11.5px; margin-top:12px; min-height:14px; line-height:1.6;
  }
  .msg.error{ color:var(--red-margin); }
  .msg.ok{ color:var(--sage); }
  .msg.pending{ color:#8a8478; }
  .back-link{
    display:inline-block; margin-top:18px; font-family:'JetBrains Mono',monospace; font-size:11.5px;
    color:#8a8478; text-decoration:none;
  }
  .back-link:hover{ color:var(--coral); }
</style>
</head>
<body>

  <div class="card">
    <div class="eyebrow">Weekly — term planner</div>
    <h1 id="heading">Checking your link…</h1>
    <p class="sub" id="subtext">One moment while we confirm your reset link.</p>

    <div id="formArea" style="display:none;">
      <div class="field">
        <label>New password</label>
        <input type="password" id="newPassword" placeholder="At least 6 characters" autocomplete="new-password">
      </div>
      <div class="field">
        <label>Confirm new password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat your new password" autocomplete="new-password">
      </div>
      <button class="submit-btn" id="submitBtn" type="button">Update password</button>
    </div>

    <div class="msg" id="msg"></div>
    <a class="back-link" href="index.html" id="backLink" style="display:none;">← Back to log in</a>
  </div>

<script>
/* =====================================================================
   Same Supabase project as your main site. Keep these in sync.
===================================================================== */
const SUPABASE_URL = 'https://qizmcgjpcunqcmvexaed.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpem1jZ2pwY3VucWNtdmV4YWVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MDcwMTksImV4cCI6MjA5ODM4MzAxOX0.9HTrgfT4jqBuSHdKDvf6s4n0ngcZmq3g-gHMmHroCMY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const heading = document.getElementById('heading');
const subtext = document.getElementById('subtext');
const formArea = document.getElementById('formArea');
const msg = document.getElementById('msg');
const backLink = document.getElementById('backLink');
const submitBtn = document.getElementById('submitBtn');

function setMsg(text, kind){
  msg.textContent = text;
  msg.className = 'msg' + (kind ? ' ' + kind : '');
}

let readyForReset = false;

// Supabase-js automatically parses the recovery token out of the URL
// (the #access_token=...&type=recovery fragment the email link lands on)
// and fires this event once it's verified the link.
sb.auth.onAuthStateChange((event, session) => {
  if(event === 'PASSWORD_RECOVERY'){
    readyForReset = true;
    heading.textContent = 'Set a new password';
    subtext.textContent = 'Enter a new password for your account below.';
    formArea.style.display = 'block';
    setMsg('');
  }
});

// If, after a couple seconds, we never got a PASSWORD_RECOVERY event and
// there's no active session either, the link was invalid, expired, or
// this page was opened directly (not via the emailed link).
setTimeout(() => {
  if(!readyForReset){
    sb.auth.getSession().then(({ data }) => {
      if(!data.session){
        heading.textContent = 'This link isn\'t valid';
        subtext.textContent = 'Password reset links expire after a short time, or may have already been used.';
        setMsg('Request a new reset link from the log in page.', 'error');
        backLink.style.display = 'inline-block';
      }
    });
  }
}, 2500);

submitBtn.addEventListener('click', async () => {
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if(newPassword.length < 6){
    setMsg('Password must be at least 6 characters.', 'error');
    return;
  }
  if(newPassword !== confirmPassword){
    setMsg('Passwords don\'t match.', 'error');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Updating…';
  setMsg('Updating your password…', 'pending');

  const { error } = await sb.auth.updateUser({ password: newPassword });

  submitBtn.disabled = false;
  submitBtn.textContent = 'Update password';

  if(error){
    setMsg(error.message, 'error');
    return;
  }

  formArea.style.display = 'none';
  heading.textContent = 'Password updated';
  subtext.textContent = 'You can now log in with your new password.';
  setMsg('');
  backLink.style.display = 'inline-block';
});
</script>
</body>
</html>
